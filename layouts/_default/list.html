{{ define "main" }}
    <h1>{{.Title}}</h1>
    {{.Content}}
    <ul class="page-list">
    {{ range (where .Pages ".Params.unlisted" "!=" "true") }}
        <li>
            {{ .Date.Format "January 2006" }} &nbsp; &mdash; &nbsp;
            <a href="{{.RelPermalink}}">{{.Title}}</a>
            {{ with .Params.subtitle }}
            &nbsp; &mdash; &nbsp; {{.}}
            {{ end }}
        </li>
    {{ end }}
    </ul>
{{ end }}
